<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Earthquake Intensity Platform</title>
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="anonymous" />
  <style>
    html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
    #map { position: absolute; inset: 0; }

    /* --- Sidebar shell: icon rail + panel --- */
    #sidebar {
      position: absolute; z-index: 1000; top: 0; left: 0; bottom: 0;
      display: flex; align-items: stretch;
      box-shadow: 0 0 14px rgba(0,0,0,.12);
    }
    #sidebar .rail {
      width: 46px; background: #fafafa; border-right: 1px solid #eee;
      display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 8px 0;
    }
    .rail-ic {
      width: 32px; height: 32px; border: none; background: transparent; cursor: pointer;
      border-radius: 7px; font-size: 17px; line-height: 1; color: #888;
      display: flex; align-items: center; justify-content: center;
    }
    .rail-ic:hover { background: #eee; color: #333; }
    .rail-ic.active { background: #111; color: #fff; }
    .rail-collapse { margin-top: auto; font-size: 20px; }

    #panel-body {
      width: 260px; background: #fff; padding: 14px; box-sizing: border-box;
      overflow-y: auto;
    }
    #sidebar.collapsed #panel-body { display: none; }

    #panel-body h4 { margin: 0 0 8px; font-size: 13px; font-weight: 700; color: #1a1a1a; }
    #panel-body section + section { display: none; } /* JS controls visibility from a later task */

    .field-label {
      display: block; font-size: 10px; margin: 9px 0 2px; color: #999;
      text-transform: uppercase; letter-spacing: .4px;
    }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    #panel-body input[type="number"] {
      width: 100%; box-sizing: border-box; padding: 6px;
      border: 1px solid #e2e2e2; background: #fafafa; border-radius: 5px; font-size: 13px;
    }
    .btn-primary {
      margin-top: 12px; width: 100%; padding: 9px; cursor: pointer; font-weight: 600;
      background: #111; color: #fff; border: none; border-radius: 6px;
    }
    .btn-secondary {
      margin-top: 8px; width: 100%; padding: 8px; cursor: pointer; font-size: 12px;
      background: #f0f0f0; color: #333; border: 1px solid #e2e2e2; border-radius: 6px;
    }
    #status { font-size: 12px; margin-top: 8px; color: #777; min-height: 16px; }

    /* Event catalog cards */
    #events { font-size: 12px; }
    .evt { cursor: pointer; padding: 6px 8px; border-bottom: 1px solid #eee; border-radius: 4px; }
    .evt:hover { background: #f5f5f5; }
    .evt-head { display: flex; align-items: center; gap: 5px; font-size: 13px; }
    .evt-mag { font-weight: 700; color: #1a1a1a; }
    .evt-magtype { font-weight: 400; color: #999; font-size: 10px; }
    .evt-alert { font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 3px; text-transform: uppercase; }
    .evt-alert.green { background: #d4edda; color: #155724; }
    .evt-alert.yellow { background: #fff3cd; color: #856404; }
    .evt-alert.orange { background: #ffe0b2; color: #e65100; }
    .evt-alert.red { background: #f8d7da; color: #721c24; }
    .evt-tsunami { font-size: 13px; line-height: 1; }
    .evt-sig { font-size: 10px; color: #bbb; margin-left: auto; }
    .evt-place { font-size: 12px; color: #555; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .evt-meta { font-size: 10px; color: #aaa; margin-top: 1px; }
    #impact { margin-top: 10px; font-size: 12px; }

    /* USGS event detail card */
    #detail { margin-top: 10px; font-size: 12px; }
    .evt-detail { background: #f8f9fa; padding: 8px; border-radius: 6px; }
    .detail-head { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
    .detail-title { font-weight: 700; font-size: 12px; color: #333; }
    .detail-info { color: #555; line-height: 1.5; }
    .detail-info div { margin: 2px 0; }
    .detail-link { display: inline-block; margin-top: 4px; font-size: 11px; color: #0366d6; }
    .detail-prods { font-size: 11px; color: #888; margin: 3px 0; }

    /* Edit mode inside detail card */
    .edit-row { display: flex; gap: 4px; margin: 3px 0; align-items: center; }
    .edit-row label { font-size: 10px; color: #999; width: 38px; flex: none; }
    .edit-row input { flex: 1; font-size: 11px; padding: 2px 4px; border: 1px solid #ddd; border-radius: 3px; }
    .btn-edit { margin-top: 4px; width: 100%; padding: 4px; cursor: pointer; font-size: 11px;
                background: #e8e8e8; color: #333; border: 1px solid #ccc; border-radius: 4px; }
    .btn-edit:hover { background: #ddd; }
    .btn-group { display: flex; gap: 4px; margin-top: 4px; }
    .btn-group button { flex: 1; }

    /* Ingest status indicator */
    #ingest-status { font-size: 10px; color: #aaa; margin-top: 4px; min-height: 14px; }
    .btn-refresh {
      margin-top: 6px; width: 100%; padding: 5px; cursor: pointer; font-size: 11px;
      background: #e8e8e8; color: #333; border: 1px solid #ccc; border-radius: 4px;
    }
    .btn-refresh:hover { background: #ddd; }
    .btn-refresh:disabled { opacity: .5; cursor: not-allowed; }
    .btn-del-detail {
      width: 100%; padding: 4px; cursor: pointer; font-size: 11px;
      background: transparent; color: #c00; border: 1px solid #f0c0c0; border-radius: 4px;
    }
    .btn-del-detail:hover { background: #ffe0e0; }

    /* Delete button on event cards */
    .evt { position: relative; }
    .evt-del {
      position: absolute; top: 2px; right: 2px;
      width: 18px; height: 18px; border: none; background: transparent;
      cursor: pointer; font-size: 13px; line-height: 1; color: #ccc; padding: 0;
      display: none; border-radius: 3px;
    }
    .evt:hover .evt-del { display: block; }
    .evt-del:hover { color: #c00; background: #ffe0e0; }

    /* Confirmation overlay */
    #confirm-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.3); display: none;
      align-items: center; justify-content: center;
    }
    #confirm-overlay.open { display: flex; }
    #confirm-box {
      background: #fff; padding: 20px 24px; border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,.2); text-align: center; min-width: 240px;
    }
    #confirm-box p { margin: 0 0 14px; font-size: 14px; color: #333; }
    #confirm-box .btn-row { display: flex; gap: 8px; justify-content: center; }
    #confirm-box button {
      padding: 6px 16px; border: none; border-radius: 5px; cursor: pointer;
      font-size: 13px; font-weight: 600;
    }
    #confirm-cancel { background: #f0f0f0; color: #333; }
    #confirm-ok { background: #c00; color: #fff; }
    #confirm-cancel:hover { background: #e0e0e0; }
    #confirm-ok:hover { background: #a00; }

    /* Map config rows (overlays checklist + basemap radios) */
    .cfg-row {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; padding: 4px 0; cursor: pointer;
    }
    .cfg-row .swatch {
      width: 14px; height: 14px; border-radius: 3px; flex: none;
      border: 1px solid rgba(0,0,0,.15);
    }
    .cfg-group + .cfg-group { margin-top: 14px; }

    .legend { line-height: 18px; color: #333; }
    .legend i { width: 16px; height: 16px; float: left; margin-right: 6px; opacity: .8; }

    /* Catalog search/filter bar */
    .filter-row { display: flex; gap: 4px; margin-bottom: 6px; }
    .filter-row input, .filter-row select {
      font-size: 11px; padding: 3px 5px; border: 1px solid #ddd; border-radius: 3px;
      background: #fafafa;
    }
    .filter-search { flex: 1; min-width: 0; }
    .filter-mag { width: 42px; }
    .filter-source { width: 68px; }
    .filter-sort { width: 90px; }
    .filter-sep { color: #ddd; line-height: 26px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="sidebar">
    <div class="rail">
      <button class="rail-ic active" data-section="event" title="Event input">✚</button>
      <button class="rail-ic" data-section="catalog" title="Catalog">≣</button>
      <button class="rail-ic" data-section="config" title="Map config">⚙</button>
      <button id="rail-collapse" class="rail-ic rail-collapse" title="Collapse">‹</button>
    </div>
    <div id="panel-body">
      <section id="sec-event">
        <h4>Event input</h4>
        <div class="grid2">
          <div><span class="field-label">Magnitude</span>
            <input id="magnitude" type="number" value="6.5" step="0.1" /></div>
          <div><span class="field-label">Depth (km)</span>
            <input id="depth_km" type="number" value="10" step="1" /></div>
        </div>
        <div class="grid2">
          <div><span class="field-label">Latitude</span>
            <input id="lat" type="number" value="34.0" step="0.01" /></div>
          <div><span class="field-label">Longitude</span>
            <input id="lon" type="number" value="72.5" step="0.01" /></div>
        </div>
        <button id="calc" class="btn-primary">Calculate intensity</button>
        <button id="ingest" class="btn-secondary">Pull USGS feed</button>
        <div><span class="field-label">Min mag for ingest</span>
          <input id="ingest-minmag" type="number" value="2.5" step="0.5" min="0" style="width:100%;box-sizing:border-box;padding:4px;border:1px solid #e2e2e2;background:#fafafa;border-radius:4px;font-size:12px" /></div>
        <div id="ingest-status"></div>
        <div id="status"></div>
      </section>
      <section id="sec-catalog">
        <h4>Catalog</h4>
        <div class="filter-row">
          <input id="filter-search" class="filter-search" type="text" placeholder="Search place…" />
          <input id="filter-minmag" class="filter-mag" type="number" min="0" step="0.5" placeholder="M≥" />
          <input id="filter-maxmag" class="filter-mag" type="number" min="0" step="0.5" placeholder="M≤" />
          <select id="filter-source" class="filter-source">
            <option value="">All</option>
            <option value="USGS">USGS</option>
            <option value="MANUAL">Manual</option>
          </select>
          <select id="filter-sort" class="filter-sort">
            <option value="time">Newest</option>
            <option value="time-asc">Oldest</option>
            <option value="magnitude">Largest</option>
          </select>
        </div>
        <div id="events"></div>
        <div id="detail"></div>
        <div id="impact"></div>
      </section>
      <section id="sec-config">
        <h4>Map configuration</h4>
        <div class="cfg-group"><div class="field-label">Overlays</div>
          <div id="overlay-list"></div></div>
        <div class="cfg-group"><div class="field-label">Basemap</div>
          <div id="basemap-list"></div></div>
      </section>
    </div>
  </div>
  <div id="confirm-overlay">
    <div id="confirm-box">
      <p id="confirm-msg">Delete this event?</p>
      <div class="btn-row">
        <button id="confirm-cancel">Cancel</button>
        <button id="confirm-ok">Delete</button>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/protomaps-leaflet@5.1.0/dist/protomaps-leaflet.js"
          integrity="sha384-pAKrddYWxjFAIJwatOtmmtq9ebz3ZwluHCEg3pqOMpOporUofLqz/l5hs+0LAWaH"
          crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
