<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Earthquake Intensity Platform</title>
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="anonymous" />
  <meta name="theme-color" content="#0F4C81" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="map"></div>
  <div id="dashboard-view">
    <div id="dash-inner">
      <h2 id="dash-title">
        <span id="dash-title-main">National Seismic Intelligence Platform</span>
        <span id="dash-title-sub">Plain-language earthquake overview for disaster management decisions</span>
      </h2>
      <div id="dash-main"></div>
    </div>
  </div>
  <div id="sidebar">
    <div class="rail">
      <button class="rail-ic active" data-section="event" title="Event input">✚</button>
      <button class="rail-ic" data-section="catalog" title="Catalog">≣</button>
      <button class="rail-ic" data-section="dashboard" title="Analytics">◰</button>
      <button class="rail-ic" data-section="config" title="Map config">⚙</button>
      <button id="theme-toggle" class="rail-ic" style="margin-top:auto" title="Toggle dark mode"></button>
      <button id="rail-collapse" class="rail-ic rail-collapse" title="Collapse">‹</button>
    </div>
    <div id="panel-body">
      <section id="sec-event">
        <h4>Event input</h4>
        <div class="grid2">
          <div><span class="field-label">Magnitude</span>
            <input id="magnitude" type="number" value="6.5" step="0.1" /></div>
          <div><span class="field-label">Depth (km)</span>
            <input id="depth_km" type="number" value="10" step="1" /></div>
        </div>
        <div class="grid2">
          <div><span class="field-label">Latitude</span>
            <input id="lat" type="number" value="34.0" step="0.01" /></div>
          <div><span class="field-label">Longitude</span>
            <input id="lon" type="number" value="72.5" step="0.01" /></div>
        </div>
        <button id="calc" class="btn-primary">Calculate intensity</button>
        <button id="ingest" class="btn-secondary">Pull USGS feed</button>
        <div><span class="field-label">Min mag for ingest</span>
          <input id="ingest-minmag" type="number" value="2.5" step="0.5" min="0" /></div>
        <div id="ingest-status"></div>
        <div id="status" role="status" aria-live="polite"></div>
      </section>
      <section id="sec-catalog">
        <h4>Catalog</h4>
        <div class="filter-row">
          <input id="filter-search" class="filter-search" type="text" placeholder="Search place…" aria-label="Search events by place" />
        </div>
        <div class="filter-row">
          <input id="filter-minmag" class="filter-mag" type="number" min="0" step="0.5" placeholder="M≥" aria-label="Minimum magnitude" />
          <input id="filter-maxmag" class="filter-mag" type="number" min="0" step="0.5" placeholder="M≤" aria-label="Maximum magnitude" />
          <select id="filter-source" class="filter-source" aria-label="Filter by source">
            <option value="">All</option>
            <option value="USGS">USGS</option>
            <option value="MANUAL">Manual</option>
          </select>
          <select id="filter-sort" class="filter-sort" aria-label="Sort order">
            <option value="time">Newest</option>
            <option value="time-asc">Oldest</option>
            <option value="magnitude">Largest</option>
          </select>
        </div>
        <div class="filter-row">
          <input id="filter-after" type="date" class="filter-date" title="From date" aria-label="From date" />
          <span class="filter-sep">–</span>
          <input id="filter-before" type="date" class="filter-date" title="To date" aria-label="To date" />
        </div>
        <div id="events"></div>
        <div id="detail"></div>
        <div id="impact"></div>
      </section>
      <section id="sec-dashboard">
        <h4>Dashboard</h4>
        <div id="dash-sidebar"><div style="font-size:11px;color:#999">Open national overview in main view</div></div>
      </section>
      <section id="sec-config">
        <h4>Map configuration</h4>
        <div class="cfg-group"><div class="field-label">Overlays</div>
          <div id="overlay-list"></div></div>
        <div class="cfg-group"><div class="field-label">Basemap</div>
          <div id="basemap-list"></div></div>
      </section>
    </div>
  </div>
  <div id="confirm-overlay">
    <div id="confirm-box" role="dialog" aria-modal="true" aria-labelledby="confirm-msg">
      <p id="confirm-msg">Delete this event?</p>
      <div class="btn-row">
        <button id="confirm-cancel">Cancel</button>
        <button id="confirm-ok">Delete</button>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/protomaps-leaflet@5.1.0/dist/protomaps-leaflet.js"
          integrity="sha384-pAKrddYWxjFAIJwatOtmmtq9ebz3ZwluHCEg3pqOMpOporUofLqz/l5hs+0LAWaH"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"
          integrity="sha384-vsrfeLOOY6KuIYKDlmVH5UiBmgIdB1oEf7p01YgWHuqmOHfZr374+odEv96n9tNC"
          crossorigin="anonymous"></script>
  <!-- Lordicon web component loader (animated icons). Icons render via <lord-icon>
       once a CDN url is set in the ICONS registry in app.js; until then a crisp
       inline SVG fallback is shown, so the UI is never broken.
       NOTE: cdn.lordicon.com/lordicon.js is an evergreen loader. The SRI hash below
       pins the known-good version; if Lordicon ships an update the browser will block
       the script (icons then fall back to SVG). Refresh this hash to re-enable, or
       self-host a pinned copy for stricter control. -->
  <script src="https://cdn.lordicon.com/lordicon.js"
          integrity="sha384-bf8L80dNwjBEi4FgXyW4kkgy4Xtjb/N7jrRuTHK5aE230r3JU+18czMr9VEtEc2F"
          crossorigin="anonymous" defer></script>
  <script src="app.js"></script>
</body>
</html>
