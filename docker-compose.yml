services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: eqmon
      POSTGRES_PASSWORD: eqmon
      POSTGRES_DB: eqmon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eqmon"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://eqmon:eqmon@db:5432/eqmon
      EQMON_VS30_TIF: /app/data/Vs30.tif
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
